<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Restaurante</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #111;
  color: #fff;
}

header {
  background: linear-gradient(90deg, #a00000, #d90416);
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

h3 {
  color: #F2B705;
}

.produto {
  background: #222;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 8px;
}

button {
  background: #25D366;
  border: none;
  padding: 10px;
  color: #fff;
  border-radius: 5px;
  margin-top: 10px;
  width: 100%;
  font-weight: bold;
}

.remover {
  background: #ff4444;
  margin-top: 5px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 5px;
  border: none;
}

.carrinho {
  background: #000;
  padding: 15px;
  border-top: 2px solid #25D366;
}

.total {
  font-size: 18px;
  margin-top: 10px;
}

.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  text-align: center;
  line-height: 60px;
  font-size: 28px;
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<header>🍽️ BOX RESTAURANTE</header>

<div class="container">

<h3>📋 Seus Dados</h3>
<input type="text" id="nome" placeholder="Seu nome">
<input type="text" id="endereco" placeholder="Seu endereço">

<select id="pagamento">
  <option value="">Forma de pagamento</option>
  <option>Pix</option>
  <option>Dinheiro</option>
  <option>Cartão</option>
</select>

<input type="text" id="troco" placeholder="Troco para (se dinheiro)">

<h3>🍛 Cardápio</h3>

<div class="produto">
  Filé de Frango - R$31,99
  <button onclick="addItem('Filé de Frango',31.99)">Adicionar</button>
</div>

<div class="produto">
  Bife - R$33,99
  <button onclick="addItem('Bife',33.99)">Adicionar</button>
</div>

<div class="produto">
  Calabresa - R$26,99
  <button onclick="addItem('Calabresa',26.99)">Adicionar</button>
</div>

<div class="produto">
  Feijoada - R$25,99
  <button onclick="addItem('Feijoada',25.99)">Adicionar</button>
</div>

</div>

<div class="carrinho">
  <h3>🛒 Seu Pedido</h3>
  <div id="lista"></div>

  <p>🚚 Taxa de entrega: R$ <span id="taxa">5.00</span></p>

  <div class="total">
    Total: R$ <span id="total">0.00</span>
  </div>

  <button onclick="finalizarPedido()">Finalizar no WhatsApp</button>
</div>

<a href="https://wa.me/5511954404784" class="whatsapp-float">💬</a>

<script>
let carrinho = [];
let total = 0;
let taxaEntrega = 5;

function addItem(nome, preco) {
  carrinho.push({nome, preco});
  total += preco;
  atualizarCarrinho();
}

function removerItem(index) {
  total -= carrinho[index].preco;
  carrinho.splice(index,1);
  atualizarCarrinho();
}

function atualizarCarrinho() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  carrinho.forEach((item, index) => {
    lista.innerHTML += `
      • ${item.nome} - R$ ${item.preco.toFixed(2)}
      <button class="remover" onclick="removerItem(${index})">Remover</button>
      <br><br>
    `;
  });

  let totalFinal = total + taxaEntrega;
  document.getElementById("total").innerText = totalFinal.toFixed(2);
}

function finalizarPedido() {
  let nome = document.getElementById("nome").value;
  let endereco = document.getElementById("endereco").value;
  let pagamento = document.getElementById("pagamento").value;
  let troco = document.getElementById("troco").value;

  if(nome === "" || endereco === "" || pagamento === "") {
    alert("Preencha todos os dados!");
    return;
  }

  let mensagem = `🍽️ *Pedido - Box Restaurante*%0A%0A`;
  mensagem += `👤 Nome: ${nome}%0A`;
  mensagem += `📍 Endereço: ${endereco}%0A`;
  mensagem += `💳 Pagamento: ${pagamento}%0A`;

  if(pagamento === "Dinheiro" && troco !== "") {
    mensagem += `💰 Troco para: R$ ${troco}%0A`;
  }

  mensagem += `%0A🛒 Pedido:%0A`;

  carrinho.forEach(item => {
    mensagem += `- ${item.nome} R$ ${item.preco.toFixed(2)}%0A`;
  });

  let totalFinal = total + taxaEntrega;

  mensagem += `%0A🚚 Taxa: R$ ${taxaEntrega.toFixed(2)}%0A`;
  mensagem += `💰 Total: R$ ${totalFinal.toFixed(2)}`;

  window.open(`https://wa.me/5511954404784?text=${mensagem}`);
}
</script>

</body>
</html>
